##
# @file nginx.conf
# @description Configuración de Nginx para servir la SPA de Jamón al Plato en producción.
#              Gestiona el enrutamiento de React Router (fallback a index.html),
#              caché agresiva para assets con hash de Vite, y compresión Gzip.
# @date 2026-05-09
# @lastUpdate 2026-05-09
# @author Sergio
##

# ⚡ PERF: Gzip activado para reducir el peso de transferencia de JS/CSS/HTML
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/json application/javascript
           text/xml application/xml application/xml+rss text/javascript
           image/svg+xml;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ⚡ PERF: Los assets de Vite llevan hash en el nombre (ej: main.3f2a1b.js)
    #         → caché inmutable de 1 año. No necesitan revalidación.
    location ~* \.(?:js|css|woff2|woff|ttf|svg|ico|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 💡 LOGIC: React Router maneja las rutas /reservas, /tienda, /blog/:id, etc.
    #           Si Nginx busca esos archivos en disco, devuelve 404.
    #           try_files redirige siempre a index.html para que React tome el control.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ⚡ PERF: El index.html nunca debe cachearse: es el punto de entrada
    #         y su versión puede cambiar en cada deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ♿ A11Y / ⚠️ NOTE: Cuando la API (/api/*) exista como servicio separado,
    #                   añadir aquí el bloque proxy_pass hacia el contenedor api:4000.
    # location /api/ {
    #     proxy_pass http://api:4000/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }
}
